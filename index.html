<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wrap 1654 CRM</title>
  <link rel="stylesheet" href="style.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="app.js?v=20"></script></head>
<body>
  <div id="globalLoader" class="global-loader" style="display:none;">
    <div class="loader-box">Загрузка...</div>
  </div>

  <header class="app-header">
    <div class="app-title">Wrap 1654 CRM</div>
    <div id="userInfo" class="app-user">👋 Пользователь</div>
  </header>

  <nav class="top-tabs">
    <button data-tab="dashboard" class="tab-btn active">Dashboard</button>
    <button data-tab="orders" class="tab-btn">Заказы</button>
    <button data-tab="clients" class="tab-btn">Клиенты</button>
    <button data-tab="inventory" class="tab-btn">Склад</button>
  </nav>

  <main class="app-main">

    <!-- DASHBOARD -->
    <section class="tab-content" data-tab-content="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Всего заказов</div>
          <div id="statTotalOrders" class="stat-value">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Активные</div>
          <div id="statActiveOrders" class="stat-value">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Клиенты</div>
          <div id="statTotalClients" class="stat-value">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">Товары</div>
          <div id="statInventoryItems" class="stat-value">0</div>
        </div>
      </div>

      <div class="card" id="recentOrdersCard">
        <div class="card-title">Последние заказы</div>
        <div id="recentOrders"></div>
      </div>
    </section>

    <!-- ORDERS -->
    <section class="tab-content" data-tab-content="orders" style="display:none;">
      <div class="card" id="orderFormCard">
        <div class="card-title">Заказ</div>

        <form id="orderForm" class="form-grid">
          <label>
            <span>Клиент</span>
            <input id="orderClientName" list="clientsDatalist" type="text" placeholder="Выбери клиента" />
          </label>

          <label>
            <span>Тип заказа</span>
            <select id="orderType">
              <option value="combined">combined</option>
              <option value="vinyl_wrap">vinyl_wrap</option>
              <option value="ppf_wrap">ppf_wrap</option>
              <option value="dechrome">dechrome</option>
              <option value="roof_wrap">roof_wrap</option>
              <option value="elements">elements</option>
              <option value="window_tint">window_tint</option>
              <option value="detailing">detailing</option>
            </select>
          </label>

          <label>
            <span>Статус</span>
            <select id="orderStatus">
              <option value="new">new</option>
              <option value="approved">approved</option>
              <option value="booked">booked</option>
              <option value="car_received">car_received</option>
              <option value="in_progress">in_progress</option>
              <option value="paused">paused</option>
              <option value="ready">ready</option>
              <option value="delivered">delivered</option>
              <option value="closed">closed</option>
              <option value="cancelled">cancelled</option>
            </select>
          </label>

          <label>
            <span>Дата начала</span>
            <input id="orderStartDate" type="date" />
          </label>

          <label>
            <span>Дата окончания</span>
            <input id="orderEndDate" type="date" />
          </label>

          <label>
            <span>Сумма</span>
            <input id="orderAmount" type="number" step="0.01" placeholder="0" />
          </label>

          <label>
            <span>Валюта</span>
            <select id="orderCurrency">
              <option value="UAH">UAH</option>
              <option value="USD">USD</option>
            </select>
          </label>

          <label class="full-row">
            <span>Комментарий</span>
            <textarea id="orderNote" rows="3" placeholder="Комментарий по заказу"></textarea>
          </label>

          <div class="form-actions full-row">
            <button type="submit" class="primary-btn">
              <span id="orderSubmitText">Добавить</span>
            </button>
            <button type="button" id="cancelOrderEdit" class="secondary-btn hidden">Отмена</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="card-title">Поиск и фильтр</div>

        <div class="filters-grid">
          <label>
            <span>Поиск</span>
            <input id="orderSearch" type="text" placeholder="Номер, тип, комментарий..." />
          </label>

          <label>
            <span>Статус</span>
            <select id="orderStatusFilter">
              <option value="all">all</option>
              <option value="new">new</option>
              <option value="approved">approved</option>
              <option value="booked">booked</option>
              <option value="car_received">car_received</option>
              <option value="in_progress">in_progress</option>
              <option value="paused">paused</option>
              <option value="ready">ready</option>
              <option value="delivered">delivered</option>
              <option value="closed">closed</option>
              <option value="cancelled">cancelled</option>
            </select>
          </label>
        </div>
      </div>

      <div id="ordersList"></div>
    </section>

    <!-- CLIENTS -->
    <section class="tab-content" data-tab-content="clients" style="display:none;">
      <div class="card" id="clientFormCard">
        <div class="card-title">Клиент</div>

        <form id="clientForm" class="form-grid">
          <label>
            <span>Имя</span>
            <input id="clientName" type="text" placeholder="Полное имя" />
          </label>

          <label>
            <span>Телефон</span>
            <input id="clientPhone" type="text" placeholder="+380..." />
          </label>

          <label>
            <span>Telegram</span>
            <input id="clientTelegram" type="text" placeholder="@username" />
          </label>

          <label>
            <span>Instagram</span>
            <input id="clientInstagram" type="text" placeholder="@instagram" />
          </label>

          <label>
            <span>Источник</span>
            <input id="clientSource" type="text" placeholder="Instagram / TikTok / рекомендация" />
          </label>

          <label class="full-row">
            <span>Заметка</span>
            <textarea id="clientNote" rows="3" placeholder="Комментарий по клиенту"></textarea>
          </label>

          <div class="form-actions full-row">
            <button type="submit" class="primary-btn">
              <span id="clientSubmitText">Добавить</span>
            </button>
            <button type="button" id="cancelClientEdit" class="secondary-btn hidden">Отмена</button>
          </div>
        </form>
      </div>

      <datalist id="clientsDatalist"></datalist>

      <div id="clientsList"></div>
    </section>

    <!-- INVENTORY -->
    <section class="tab-content" data-tab-content="inventory" style="display:none;">
      <div class="card" id="inventoryFormCard">
        <div class="card-title">Товар / материал</div>

        <form id="inventoryForm" class="form-grid">
          <label>
            <span>Категория</span>
            <select id="inventoryCategory">
              <option value="vinyl">vinyl</option>
              <option value="ppf">ppf</option>
              <option value="tint">tint</option>
              <option value="consumables">consumables</option>
              <option value="chemicals">chemicals</option>
              <option value="tools">tools</option>
              <option value="accessories">accessories</option>
              <option value="other">other</option>
            </select>
          </label>

          <label>
            <span>Бренд</span>
            <input id="inventoryBrand" type="text" placeholder="Hexis / 3M / KPMF" />
          </label>

          <label>
            <span>Название</span>
            <input id="inventoryName" type="text" placeholder="Название" />
          </label>

          <label>
            <span>SKU</span>
            <input id="inventorySku" type="text" placeholder="Код / артикул" />
          </label>

          <label>
            <span>Цвет</span>
            <input id="inventoryColor" type="text" placeholder="Black / Satin / Gloss" />
          </label>

          <label>
            <span>Ширина (см)</span>
            <input id="inventoryWidthCm" type="number" step="0.01" placeholder="152" />
          </label>

          <label>
            <span>Количество</span>
            <input id="inventoryQuantity" type="number" step="0.01" placeholder="0" />
          </label>

          <label>
            <span>Ед. изм.</span>
            <select id="inventoryUnit">
              <option value="m">m</option>
              <option value="pcs">pcs</option>
              <option value="roll">roll</option>
              <option value="l">l</option>
              <option value="set">set</option>
            </select>
          </label>

          <label>
            <span>Цена вход</span>
            <input id="inventoryPurchasePrice" type="number" step="0.01" placeholder="0" />
          </label>

          <label>
            <span>Цена розница</span>
            <input id="inventoryRetailPrice" type="number" step="0.01" placeholder="0" />
          </label>

          <label>
            <span>Валюта</span>
            <select id="inventoryCurrency">
              <option value="UAH">UAH</option>
              <option value="USD">USD</option>
            </select>
          </label>

          <label>
            <span>Поставщик</span>
            <input id="inventorySupplier" type="text" placeholder="Поставщик" />
          </label>

          <label>
            <span>Мин. остаток</span>
            <input id="inventoryMinQuantity" type="number" step="0.01" placeholder="0" />
          </label>

          <label class="full-row">
            <span>Комментарий</span>
            <textarea id="inventoryNote" rows="3" placeholder="Комментарий по товару"></textarea>
          </label>

          <div class="form-actions full-row">
            <button type="submit" class="primary-btn">
              <span id="inventorySubmitText">Добавить</span>
            </button>
            <button type="button" id="cancelInventoryEdit" class="secondary-btn hidden">Отмена</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="card-title">Поиск и фильтр</div>

        <div class="filters-grid">
          <label>
            <span>Поиск</span>
            <input id="inventorySearch" type="text" placeholder="Бренд, название, цвет..." />
          </label>

          <label>
            <span>Категория</span>
            <select id="inventoryCategoryFilter">
              <option value="all">all</option>
              <option value="vinyl">vinyl</option>
              <option value="ppf">ppf</option>
              <option value="tint">tint</option>
              <option value="consumables">consumables</option>
              <option value="chemicals">chemicals</option>
              <option value="tools">tools</option>
              <option value="accessories">accessories</option>
              <option value="other">other</option>
            </select>
          </label>
        </div>
      </div>

      <div id="inventoryList"></div>
    </section>

  </main>

  <script src="app.js?v=20"></script>
</body>
</html>
