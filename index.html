<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Wrap 1654 Manager</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #020817;
      --panel: #0f172a;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #020617 0%, #020b1d 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 14px 110px;
    }

    .topbar {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .topbar-title {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .topbar-sub {
      color: var(--muted);
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.9);
      color: #cbd5e1;
      border-radius: 16px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
    }

    .tab-content {
      display: none;
    }

    .card {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    input, select, textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 8px;
    }

    textarea {
      min-height: 80px;
    }

    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: 800;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      cursor: pointer;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    @media (max-width: 640px) {
      .tabs {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="topbar">
      <h1 class="topbar-title">Wrap 1654 Manager</h1>
      <div class="topbar-sub">Управление заказами, клиентами и складом</div>
      <div id="userInfo">👋 Загрузка...</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Главная</button>
      <button class="tab-btn" data-tab="orders">Заказы</button>
      <button class="tab-btn" data-tab="clients">Клиенты</button>
      <button class="tab-btn" data-tab="inventory">Склад</button>
    </div>

    <section class="tab-content" data-tab-content="dashboard">
      <div class="card">
        <div class="card-title">Статистика</div>
        <div id="dashboardStats">Загрузка...</div>
      </div>
    </section>

    <section class="tab-content" data-tab-content="orders">
      <div class="card">
        <div class="card-title">Новый заказ</div>

        <input id="orderClientName" placeholder="Клиент">
        <input id="orderCarModel" placeholder="Авто">
        <textarea id="orderServices" placeholder="Услуги"></textarea>

        <input id="orderAmount" type="number" placeholder="Сумма">

        <select id="orderCurrency">
          <option value="UAH">UAH</option>
          <option value="USD">USD</option>
        </select>

        <button class="primary-btn">Создать заказ</button>
      </div>

      <div class="card">
        <div class="card-title">Заказы</div>
        <div id="ordersList" class="list"></div>
      </div>
    </section>

    <section class="tab-content" data-tab-content="clients">
      <div class="card">
        <div class="card-title">Клиенты</div>
        <div id="clientsList"></div>
      </div>
    </section>

    <section class="tab-content" data-tab-content="inventory">
      <div class="card">
        <div class="card-title">Склад</div>
        <div id="inventoryList"></div>
      </div>
    </section>

  </div>

  <script src="./app.js"></script>
</body>
</html>
