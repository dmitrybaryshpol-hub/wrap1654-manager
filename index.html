<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrap 1654 Manager</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="access-denied" class="center hidden">
<h2>Нет доступа</h2>
</div>

<div id="app-content" class="hidden">

<div class="top-logo">Wrap 1654</div>

<div class="stats">
<div class="stat-card">
<b id="money-day">0$</b>
<small>Оборот день</small>
</div>

<div class="stat-card">
<b id="profit-day">0$</b>
<small>Прибыль день</small>
</div>

<div class="stat-card">
<b id="money-week">0$</b>
<small>Неделя</small>
</div>
</div>

<div id="calendar-strip"></div>

<div id="events"></div>

<!-- FAB -->
<div class="fab" onclick="openOrderModal()">+</div>

</div>

<!-- MODAL -->
<div id="modal-order" class="modal">
<div class="modal-content">

<div class="modal-body">

<input id="car-client" placeholder="Клиент">
<input id="car-model" placeholder="Авто">

<input id="date-start" type="datetime-local">

<input id="order-amount" type="number" placeholder="Сумма">

<select id="film-select"></select>
<input id="film-qty" type="number" placeholder="Метры">

<input type="file" id="media">

</div>

<div class="modal-footer">
<button onclick="submitOrder()" class="save-btn">СОХРАНИТЬ</button>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
