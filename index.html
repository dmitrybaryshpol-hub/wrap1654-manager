<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wrap 1654 Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="access-denied" class="hidden">
    <div class="denied-content">
        <span style="font-size: 50px;">🚫</span>
        <h2>Нет доступа</h2>
        <p>Ваш ID не найден в базе авторизованных пользователей.</p>
    </div>
</div>

<div id="app-content" class="hidden">
    <div class="top-logo">Wrap 1654</div>

    <div class="stats">
        <div class="stat-card"><b id="money-day">0$</b><small>Оборот</small></div>
        <div class="stat-card"><b id="profit-day">0$</b><small>Прибыль</small></div>
        <div class="stat-card"><b id="money-week">0$</b><small>Неделя</small></div>
    </div>

    <div id="calendar-strip"></div>
    <div id="events"></div>

    <div class="fab" onclick="openOrderModal()">+</div>
</div>

<div id="modal-order" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <h3>Новый заказ</h3>
            <input id="car-client" placeholder="Имя клиента">
            <input id="car-model" placeholder="Марка авто">
            <div class="form-row">
                <div><label>Дата</label><input type="datetime-local" id="date-start"></div>
                <div><label>Сумма ($)</label><input type="number" id="order-amount" placeholder="0"></div>
            </div>
            <div class="form-row">
                <div><label>Плёнка</label><select id="film-select"></select></div>
                <div><label>Метры</label><input type="number" id="film-qty" step="0.1" value="0"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="save-btn" onclick="submitOrder()">СОХРАНИТЬ</button>
            <button class="save-btn cancel" onclick="closeModal('modal-order')">ОТМЕНА</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
