<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Wrap 1654 Manager</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<script src="app.js?v=2"></script>
<body>
  <div id="access-denied" class="screen-center hidden">
    <div class="denied-box">
      <div class="denied-icon">🚫</div>
      <h2>Нет доступа</h2>
      <p>Открой приложение через разрешённый Telegram-аккаунт.</p>
    </div>
  </div>

  <div id="app-content">
    <section id="page-home" class="page active">
      <header class="topbar">
        <div class="brand">Wrap 1654</div>
        <div class="subbrand">Manager</div>
      </header>

      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Оборот день</div>
          <div class="stat-value" id="money-day">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Прибыль день</div>
          <div class="stat-value profit" id="profit-day">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Оборот неделя</div>
          <div class="stat-value" id="money-week">$0</div>
        </div>
      </section>

      <section class="calendar-wrap">
        <div id="calendar-strip" class="calendar-strip"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <h3>Записи на день</h3>
          <span id="events-count" class="muted">0 заказов</span>
        </div>
        <div id="events"></div>
      </section>
    </section>

    <section id="page-clients" class="page">
      <header class="topbar">
        <div class="brand">Клиенты</div>
        <div class="subbrand">База</div>
      </header>

      <div class="page-actions">
        <button class="outline-btn" onclick="openClientModal()">+ Добавить клиента</button>
      </div>

      <section class="section-block">
        <div id="clients-list"></div>
      </section>
    </section>

    <section id="page-storage" class="page">
      <header class="topbar">
        <div class="brand">Склад</div>
        <div class="subbrand">Материалы</div>
      </header>

      <div class="page-actions">
        <button class="outline-btn" onclick="openStorageModal()">+ Добавить материал</button>
      </div>

      <section class="section-block">
        <div class="section-head">
          <h3>Плёнка</h3>
        </div>
        <div id="film-list"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <h3>Товар</h3>
        </div>
        <div id="product-list"></div>
      </section>
    </section>

    <button class="fab" onclick="openOrderModal()">+</button>

    <nav class="bottom-nav">
      <button class="nav-item active" onclick="showPage('home', this)">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
      </button>
      <button class="nav-item" onclick="showPage('clients', this)">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Клиенты</span>
      </button>
      <button class="nav-item" onclick="showPage('storage', this)">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Склад</span>
      </button>
    </nav>
  </div>

  <!-- МОДАЛКА ЗАКАЗА -->
  <div id="modal-order" class="modal">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>

      <div class="modal-body">
        <div class="modal-title-row">
          <h3 id="order-modal-title">Новый заказ</h3>
        </div>

        <label class="field-label">Клиент</label>
        <input id="car-client" list="clients-list-options" placeholder="Имя клиента" />
        <datalist id="clients-list-options"></datalist>

        <label class="field-label">Авто</label>
        <input id="car-model" placeholder="Марка и модель авто" />

        <div class="form-row">
          <div class="field-col">
            <label class="field-label">Начало</label>
            <input id="date-start" type="datetime-local" />
          </div>
          <div class="field-col">
            <label class="field-label">Конец</label>
            <input id="date-end" type="datetime-local" />
          </div>
        </div>

        <div class="form-row">
          <div class="field-col">
            <label class="field-label">Статус</label>
            <select id="status">
              <option value="new">Новый</option>
              <option value="in_progress">В работе</option>
              <option value="done">Готово</option>
            </select>
          </div>

          <div class="field-col">
            <label class="field-label">Сумма ($)</label>
            <input id="order-amount" type="number" placeholder="0" />
          </div>
        </div>

        <div class="form-row">
          <div class="field-col">
            <label class="field-label">Плёнка</label>
            <select id="film-select">
              <option value="">Без плёнки</option>
            </select>
          </div>

          <div class="field-col">
            <label class="field-label">Метров</label>
            <input id="film-qty" type="number" step="0.1" value="0" />
          </div>
        </div>

        <label class="field-label">Описание работ</label>
        <textarea id="services" placeholder="Описание работ..."></textarea>

        <label class="field-label">Фото / видео</label>
        <input id="media" type="file" accept="image/*,video/*" onchange="previewMedia(event)" />
        <div id="preview" class="preview-box"></div>

        <button id="btn-delete-order" class="danger-btn hidden" onclick="deleteOrder()">
          УДАЛИТЬ ЗАКАЗ
        </button>
      </div>

      <div class="modal-footer">
        <button class="primary-btn" onclick="submitOrder()">СОХРАНИТЬ</button>
        <button class="secondary-btn" onclick="closeModal('modal-order')">Отмена</button>
      </div>
    </div>
  </div>

  <!-- МОДАЛКА КЛИЕНТА -->
  <div id="modal-client" class="modal">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>

      <div class="modal-body">
        <h3>Новый клиент</h3>

        <label class="field-label">Имя</label>
        <input id="client-name" placeholder="ФИО / имя" />

        <label class="field-label">Телефон</label>
        <input id="client-phone" placeholder="Телефон" />

        <label class="field-label">Telegram ID / username</label>
        <input id="client-tg" placeholder="Необязательно" />
      </div>

      <div class="modal-footer">
        <button class="primary-btn" onclick="submitClient()">СОХРАНИТЬ</button>
        <button class="secondary-btn" onclick="closeModal('modal-client')">Отмена</button>
      </div>
    </div>
  </div>

  <!-- МОДАЛКА СКЛАДА -->
  <div id="modal-storage" class="modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>

    <div class="modal-body">
      <div class="modal-title-row">
        <h3>Склад</h3>
      </div>

      <label class="field-label">Тип</label>
      <select id="storage-type">
        <option value="film">Плёнка</option>
        <option value="product">Товар</option>
      </select>

      <label class="field-label">Название материала</label>
      <input id="st-name" type="text" placeholder="Название материала" />

      <label class="field-label">Количество</label>
      <input id="st-qty" type="number" step="0.01" placeholder="Количество" />

      <<label class="field-label">Цена вход</label>
<input id="st-price-in" type="number" step="0.01" placeholder="Цена вход" />

<label class="field-label">Цена розница</label>
<input id="st-price-out" type="number" step="0.01" placeholder="Цена розница" />

<label class="field-label">Валюта</label>
<select id="st-currency">
  <option value="USD">$ Доллар</option>
  <option value="UAH">₴ Гривна</option>
</select>
    </div>

    <div class="modal-footer">
      <button id="btn-save-storage" class="primary-btn" onclick="submitStorage()">
        ДОБАВИТЬ
      </button>
      <button class="secondary-btn" onclick="closeModal('modal-storage')">
        Отмена
      </button>
    </div>
  </div>
</div>
  <!-- МОДАЛКА ИСТОРИИ КЛИЕНТА -->
  <div id="modal-client-history" class="modal">
    <div class="modal-sheet">
      <div class="sheet-handle"></div>

      <div class="modal-body">
        <h3 id="history-name">История клиента</h3>
        <div id="history-list"></div>
      </div>

      <div class="modal-footer">
        <button class="primary-btn" onclick="closeModal('modal-client-history')">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
