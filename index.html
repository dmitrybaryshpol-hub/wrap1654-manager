<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wrap 1654 Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="black-bg">

<div id="app-content" class="hidden">
    
    <div id="page-home" class="page active">
        <div class="top-logo">Wrap 1654</div>
        <div class="stats">
            <div class="stat-card"><b id="money-day">0$</b><small>Оборот</small></div>
            <div class="stat-card"><b id="profit-day">0$</b><small>Прибыль</small></div>
            <div class="stat-card"><b id="money-week">0$</b><small>Неделя</small></div>
        </div>
        <div id="calendar-strip"></div>
        <div id="events"></div>
        <div class="fab" onclick="openModal('modal-order')">+</div>
    </div>

    <div id="page-clients" class="page">
        <div class="top-logo">Клиенты</div>
        <div id="clients-list" class="list-container"></div>
        <div class="fab" onclick="openModal('modal-client')">+</div>
    </div>

    <div id="page-storage" class="page">
        <div class="top-logo">Склад</div>
        <div id="storage-list" class="list-container"></div>
        <div class="fab" onclick="openModal('modal-storage')">+</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="showPage('home')">🏠</div>
        <div class="nav-item" onclick="showPage('clients')">👤</div>
        <div class="nav-item" onclick="showPage('storage')">📦</div>
    </div>
</div>

<div id="modal-order" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <h3>Новый заказ</h3>
            <input id="car-client" placeholder="Имя клиента">
            <input id="car-model" placeholder="Авто">
            <div class="form-row">
                <div><label>Дата</label><input type="datetime-local" id="date-start"></div>
                <div><label>Сумма ($)</label><input type="number" id="order-amount"></div>
            </div>
            <select id="film-select"></select>
            <input id="film-qty" type="number" placeholder="Метры плёнки" step="0.1">
            <input type="file" id="media" accept="image/*">
        </div>
        <div class="modal-footer">
            <button class="save-btn" onclick="submitOrder()">СОХРАНИТЬ</button>
            <button class="save-btn cancel" onclick="closeModal('modal-order')">ОТМЕНА</button>
        </div>
    </div>
</div>

<div id="modal-client" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <h3>Новый клиент</h3>
            <input id="new-client-name" placeholder="ФИО">
            <input id="new-client-phone" placeholder="Телефон">
        </div>
        <div class="modal-footer">
            <button class="save-btn" onclick="addClient()">ДОБАВИТЬ</button>
            <button class="save-btn cancel" onclick="closeModal('modal-client')">ОТМЕНА</button>
        </div>
    </div>
</div>

<div id="modal-storage" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <h3>Добавить на склад</h3>
            <input id="st-name" placeholder="Название материала">
            <input id="st-price" type="number" placeholder="Цена за ед.">
            <input id="st-qty" type="number" placeholder="Количество">
            <select id="st-type">
                <option value="film">Плёнка (м)</option>
                <option value="other">Прочее (шт)</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="save-btn" onclick="addStorage()">СОХРАНИТЬ</button>
            <button class="save-btn cancel" onclick="closeModal('modal-storage')">ОТМЕНА</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
