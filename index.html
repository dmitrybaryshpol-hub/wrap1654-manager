<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrap 1654 Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="access-denied" style="display:none; height:100vh; display:flex; align-items:center; justify-content:center;">
<h2>Нет доступа</h2>
</div>

<div id="app-content" style="display:none;">

<div id="page-home" class="page active">

<div class="top-logo">Wrap 1654</div>

<div class="stats">
<div class="stat-card"><b id="money-day">0$</b><small>Сегодня</small></div>
<div class="stat-card"><b id="money-week">0$</b><small>Неделя</small></div>
</div>

<div id="calendar-strip"></div>

<div id="events"></div>

</div>

<div class="fab" onclick="openOrderModal()">+</div>

<!-- МОДАЛКА -->
<div id="modal-order" class="modal">
<div class="modal-content">

<div class="modal-body">

<input id="car-client" placeholder="Клиент">
<input id="car-model" placeholder="Авто">

<select id="status">
<option value="new">Новый</option>
<option value="in_progress">В работе</option>
<option value="done">Готово</option>
</select>

<input id="date-start" type="datetime-local">
<input id="order-amount" type="number" placeholder="Сумма">

<input type="file" id="media">

</div>

<div class="modal-footer">
<button onclick="submitOrder()" class="save-btn">СОХРАНИТЬ</button>
</div>

</div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
