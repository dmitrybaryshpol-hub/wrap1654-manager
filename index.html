<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrap 1654 Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="access-denied">Нет доступа</div>

<div id="app-content">

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="top-logo">Wrap 1654</div>
        <div id="events"></div>
    </div>

    <!-- КЛИЕНТЫ -->
    <div id="page-clients" class="page">
        <div class="top-logo">Клиенты</div>
        <button class="add-btn" onclick="openClientModal()">+ Добавить клиента</button>
        <div id="clients-list"></div>
    </div>

    <!-- СКЛАД -->
    <div id="page-storage" class="page">
        <div class="top-logo">Склад</div>
        <button class="add-btn" onclick="openStorageModal()">+ Добавить</button>

        <h3 class="section-title">Плёнка</h3>
        <div id="film-list"></div>

        <h3 class="section-title">Товар</h3>
        <div id="product-list"></div>
    </div>

    <!-- FAB -->
    <div class="fab" onclick="openOrderModal()">+</div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)">🏠</div>
        <div class="nav-item" onclick="showPage('clients', this)">👤</div>
        <div class="nav-item" onclick="showPage('storage', this)">📦</div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
