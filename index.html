<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrap 1654 Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="app-content">

<!-- ГЛАВНАЯ -->
<div id="page-home" class="page active">
    <div class="top-logo">Wrap 1654</div>

    <!-- СТАТА -->
    <div class="stats">
        <div class="stat-card">
            <span>💰</span>
            <b id="stat-money">0$</b>
            <small>Сегодня</small>
        </div>
        <div class="stat-card">
            <span>🚗</span>
            <b id="stat-cars">0</b>
            <small>Машин</small>
        </div>
    </div>

    <div id="calendar-strip" class="calendar-strip"></div>

    <div id="events"></div>
</div>

<!-- КЛИЕНТЫ -->
<div id="page-clients" class="page">
    <div class="top-logo">Клиенты</div>
    <button class="add-btn" onclick="openClientModal()">+ Добавить</button>
    <div id="clients-list"></div>
</div>

<!-- СКЛАД -->
<div id="page-storage" class="page">
    <div class="top-logo">Склад</div>
    <button class="add-btn" onclick="openStorageModal()">+ Добавить</button>

    <h3 class="section-title">Плёнка</h3>
    <div id="film-list"></div>

    <h3 class="section-title">Товар</h3>
    <div id="product-list"></div>
</div>

<!-- FAB -->
<div class="fab" onclick="openOrderModal()">+</div>

<!-- МОДАЛКА -->
<div id="modal-order" class="modal">
<div class="modal-content">

<div class="modal-body">
<input id="car-client" placeholder="Клиент">
<input id="car-model" placeholder="Авто">

<select id="status">
<option value="new">Новый</option>
<option value="in_progress">В работе</option>
<option value="done">Готово</option>
</select>

<input id="date-start" type="datetime-local">
<input id="order-amount" type="number" placeholder="Сумма">
<textarea id="services"></textarea>
</div>

<div class="modal-footer">
<button class="save-btn" onclick="submitOrder()">СОХРАНИТЬ</button>
</div>

</div>
</div>

<!-- НАВИГАЦИЯ -->
<div class="bottom-nav">
<div onclick="showPage('home')">🏠</div>
<div onclick="showPage('clients')">👤</div>
<div onclick="showPage('storage')">📦</div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
